# Ensure only packages released at least 1 day ago can be installed.
minimumReleaseAge: 1440

nodeLinker: "hoisted"

allowBuilds:
  "@sentry/cli": true
  esbuild: false
  msgpackr-extract: false
  react-native-audio-browser@https://codeload.github.com/MissingCore/react-native-audio-browser/tar.gz/f202a8f0acad8e1051fc70d0f31206c1851b7a8d: true
  unrs-resolver: false

minimumReleaseAgeExclude:
  - "@missingcore/react-native-metadata-retriever@3.2.1"

patchedDependencies:
  "@lodev09/react-native-true-sheet": "patches/@lodev09__react-native-true-sheet.patch"
  react-native-android-widget: "patches/react-native-android-widget.patch"
