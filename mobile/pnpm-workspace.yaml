# Ensure only packages released at least 1 day ago can be installed.
minimumReleaseAge: 1440

nodeLinker: "hoisted"

allowBuilds:
  "@missingcore/music-glyph-toys": true
  "@sentry/cli": true
  esbuild: false
  msgpackr-extract: false
  "react-native-audio-browser": true
  "sharp": true
  unrs-resolver: false

patchedDependencies:
  "@lodev09/react-native-true-sheet": "patches/@lodev09__react-native-true-sheet.patch"
  "react-native-android-widget": "patches/react-native-android-widget.patch"
